version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: devsecops_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: devsecops
      POSTGRES_USER: devsecops
      POSTGRES_PASSWORD: devsecops_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devsecops"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: devsecops_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: devsecops_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: devsecops
      RABBITMQ_DEFAULT_PASS: devsecops_secret
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: devsecops_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      # Shorter keep-alive reduces idle GPU/RAM use between AI requests
      - OLLAMA_KEEP_ALIVE=5m
    deploy:
      resources:
        limits:
          memory: 4G

  ollama-init:
    image: ollama/ollama:latest
    container_name: devsecops_ollama_init
    depends_on:
      - ollama
    entrypoint: >
      sh -c "sleep 5 && ollama pull llama3 && echo 'Model pulled successfully'"
    environment:
      - OLLAMA_HOST=http://ollama:11434
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devsecops_backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/devsecops
      SPRING_DATASOURCE_USERNAME: devsecops
      SPRING_DATASOURCE_PASSWORD: devsecops_secret
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: devsecops
      SPRING_RABBITMQ_PASSWORD: devsecops_secret
      OLLAMA_BASE_URL: http://ollama:11434
      JASYPT_ENCRYPTOR_PASSWORD: ${JASYPT_ENCRYPTOR_PASSWORD:-changeme_in_production}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - scan_workspace:/tmp/scan-workspace

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: devsecops_frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      - backend
    environment:
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-changeme_in_production}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NEXT_PUBLIC_WS_URL: ws://localhost:8080
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  ollama_data:
  scan_workspace:
