spring:
  application:
    name: agentguard

  config:
    import: optional:file:.env[.properties]

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-init-sql: SELECT 1

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    url: ${DATABASE_URL}
    user: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      timeout: 2000ms


  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

server:
  port: ${PORT:8080}

langchain4j:
  ollama:
    base-url: ${OLLAMA_BASE_URL:https://vish85521-qwen.hf.space}
    model-name: ${OLLAMA_MODEL:gemma4:31b-cloud}
    timeout-minutes: ${OLLAMA_TIMEOUT_MINUTES:3}
    log-requests: false
    log-responses: false

jasypt:
  encryptor:
    password: ${JASYPT_ENCRYPTOR_PASSWORD}
    algorithm: PBEWithMD5AndDES

app:
  scan:
    workspace-dir: ${SCAN_WORKSPACE_DIR:/tmp/scan-workspace}
    timeout-minutes: 30
    max-concurrent-scans: 5
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.devsecops: DEBUG
    org.springframework.security: INFO
    org.springframework.amqp: WARN
    com.rabbitmq: WARN
